[versions]
agp = "8.7.3"
kotlin = "2.2.21"
ksp = "2.2.21-2.0.5"
hilt = "2.58"
protonCore = "36.6.0"
room = "2.7.1"
lifecycle = "2.8.3"
navigation = "2.7.7"
compose-bom = "2024.09.00"
coil = "2.6.0"
retrofit = "2.11.0"
okhttp = "4.12.0"
coroutines = "1.8.0"
work = "2.9.1"
