proton-device-migration-dagger = { module = "me.proton.core:device-migration-dagger", version.ref = "protonCore" }
proton-notification-dagger = { module = "me.proton.core:notification-dagger", version.ref = "protonCore" }
proton-user-recovery-dagger = { module = "me.proton.core:user-recovery-dagger", version.ref = "protonCore" }
proton-util-android-dagger = { module = "me.proton.core:util-android-dagger", version.ref = "protonCore" }
proton-account-data = { module = "me.proton.core:account-data", version.ref = "protonCore" }
