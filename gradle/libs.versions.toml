# Proton Core dagger/hilt modules (auto-install Hilt bindings)
proton-network-dagger = { module = "me.proton.core:network-dagger", version.ref = "protonCore" }
proton-auth-dagger = { module = "me.proton.core:auth-dagger", version.ref = "protonCore" }
